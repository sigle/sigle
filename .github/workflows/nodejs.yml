name: Node CI
permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo

      - name: Check dependencies consistency
        run: pnpm syncpack lint

      - name: Check formatting, linting and type checks.
        run: pnpm vp check

      - name: Build
        run: |
          cp apps/sigle/.env.development apps/sigle/.env.production.local
          cp apps/custom-domain/.env.development apps/custom-domain/.env.production.local
          pnpm build

      - name: Test
        run: pnpm test

  test-contracts:
    name: "Test contracts"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: "Check contract syntax (contracts)"
        uses: docker://hirosystems/clarinet:3.5.0
        with:
          args: check --manifest-path ./apps/contracts/Clarinet.toml

      - name: "Check contract syntax (contracts-next)"
        uses: docker://hirosystems/clarinet:3.5.0
        with:
          args: check --manifest-path ./apps/contracts-next/Clarinet.toml
